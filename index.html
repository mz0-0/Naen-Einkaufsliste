<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="LISTE"/>
  <meta name="theme-color" content="#080808"/>
  <title>NEAR // LISTE</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#080808; --bg1:#0e0e0e; --bg2:#141414; --bg3:#1c1c1c;
      --line:#1e1e1e; --line2:#2a2a2a; --dim:#383838; --muted:#606060;
      --text:#c0c0c0; --bright:#e0e0e0; --white:#efefef; --accent:#d0d0d0;
      --mono:'Share Tech Mono',monospace; --sans:'Rajdhani',sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; overflow: hidden; }
    body { background:var(--bg); color:var(--text); font-family:var(--sans); display:flex; flex-direction:column; height:100dvh; }
    ::-webkit-scrollbar { display:none; }

    .topbar { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:0 18px; height:52px; border-bottom:1px solid var(--line); background:var(--bg1); padding-top:env(safe-area-inset-top,0); }
    .topbar-title { font-family:var(--mono); font-size:11px; letter-spacing:.18em; color:var(--muted); text-transform:uppercase; }
    .topbar-title span { color:var(--accent); }
    .topbar-right { display:flex; align-items:center; gap:10px; }
    .count-badge { font-family:var(--mono); font-size:9px; color:var(--dim); letter-spacing:.1em; }
    .sync-dot { width:5px; height:5px; border-radius:50%; background:#5a9e6f; box-shadow:0 0 5px #5a9e6f; transition:background .3s, box-shadow .3s; }
    .sync-dot.syncing { background:var(--accent); box-shadow:0 0 5px var(--accent); animation:blink 1s ease-in-out infinite; }
    .sync-dot.offline { background:#e05555; box-shadow:0 0 5px #e05555; }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    .tabs { flex-shrink:0; display:flex; overflow-x:auto; border-bottom:1px solid var(--line); background:var(--bg1); padding:0 18px; }
    .tab { font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); background:none; border:none; border-bottom:2px solid transparent; padding:0 12px; height:38px; cursor:pointer; white-space:nowrap; transition:color .15s,border-color .15s; }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--white); border-bottom-color:var(--accent); }

    .input-bar { flex-shrink:0; display:flex; padding:10px 18px; border-bottom:1px solid var(--line); background:var(--bg1); gap:0; }
    .inp { flex:1; background:var(--bg2); border:1px solid var(--line2); border-right:none; color:var(--bright); font-family:var(--mono); font-size:12px; padding:9px 12px; outline:none; transition:border-color .15s; }
    .inp:focus { border-color:var(--dim); }
    .inp::placeholder { color:var(--dim); }
    .cat-select { background:var(--bg2); border:1px solid var(--line2); border-right:none; color:var(--muted); font-family:var(--mono); font-size:10px; padding:0 8px; outline:none; cursor:pointer; }
    .add-btn { background:var(--bg3); border:1px solid var(--line2); color:var(--muted); font-family:var(--mono); font-size:16px; padding:0 16px; cursor:pointer; transition:all .15s; display:flex; align-items:center; }
    .add-btn:hover { color:var(--white); border-color:var(--dim); }
    .add-btn:active { background:var(--dim); }

    .list-wrap { flex:1; overflow-y:auto; padding:10px 18px; padding-bottom:calc(10px + var(--safe-bottom)); }

    .cat-section { margin-bottom:16px; }
    .cat-label { font-family:var(--mono); font-size:8px; letter-spacing:.2em; text-transform:uppercase; color:var(--dim); padding:6px 0; margin-bottom:4px; border-bottom:1px solid var(--line); }
    .cat-label span { color:var(--muted); margin-right:6px; }

    .item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--bg1); border:1px solid var(--line); margin-bottom:4px; transition:opacity .2s,border-color .15s; animation:slideIn .18s ease; }
    @keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
    .item:hover { border-color:var(--line2); }
    .item.checked { opacity:.35; }

    .cb { width:15px; height:15px; flex-shrink:0; border:1px solid var(--dim); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .cb.on { background:var(--dim); border-color:var(--accent); }
    .cb svg { display:none; } .cb.on svg { display:block; }

    .item-name { flex:1; font-family:var(--sans); font-size:14px; font-weight:500; color:var(--bright); min-width:0; }
    .item.checked .item-name { text-decoration:line-through; color:var(--muted); }

    .fav-btn { background:none; border:none; cursor:pointer; font-size:12px; opacity:.3; transition:opacity .15s; flex-shrink:0; }
    .fav-btn.on { opacity:1; }
    .fav-btn:hover { opacity:.7; }

    .del-btn { background:none; border:none; cursor:pointer; color:var(--dim); transition:color .15s; display:flex; align-items:center; flex-shrink:0; padding:2px; }
    .del-btn:hover { color:#e05555; }

    .empty { font-family:var(--mono); font-size:10px; color:var(--dim); letter-spacing:.12em; text-align:center; padding:40px 0; }

    .bottom-bar { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:8px 18px; padding-bottom:calc(8px + var(--safe-bottom)); border-top:1px solid var(--line); background:var(--bg1); }
    .bottom-info { font-family:var(--mono); font-size:9px; color:var(--dim); letter-spacing:.1em; }
    .clear-btn { font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); background:none; border:1px solid var(--line2); padding:5px 10px; cursor:pointer; transition:all .15s; }
    .clear-btn:hover { color:#e05555; border-color:#3d1515; }

    .fav-item { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:var(--bg1); border:1px solid var(--line); margin-bottom:4px; transition:border-color .15s; animation:slideIn .18s ease; }
    .fav-item:hover { border-color:var(--line2); }
    .fav-name { font-family:var(--sans); font-size:14px; font-weight:500; color:var(--bright); }
    .fav-cat { font-family:var(--mono); font-size:9px; color:var(--dim); }
    .fav-add { font-family:var(--mono); font-size:10px; color:var(--muted); background:none; border:1px solid var(--line2); padding:4px 8px; cursor:pointer; transition:all .15s; }
    .fav-add:hover { color:var(--white); border-color:var(--dim); }

    .loading { font-family:var(--mono); font-size:10px; color:var(--dim); letter-spacing:.12em; text-align:center; padding:40px 0; animation:blink 1.2s ease-in-out infinite; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">NEAR // <span>LISTE</span></div>
  <div class="topbar-right">
    <div class="count-badge" id="countBadge">VERBINDE...</div>
    <div class="sync-dot syncing" id="syncDot"></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="liste" onclick="switchTab('liste')">Liste</button>
  <button class="tab" data-tab="favoriten" onclick="switchTab('favoriten')">Favoriten</button>
  <button class="tab" data-tab="erledigt" onclick="switchTab('erledigt')">Erledigt</button>
</div>

<div class="input-bar">
  <select class="cat-select" id="catSelect">
    <option value="🥦">🥦</option>
    <option value="🥩">🥩</option>
    <option value="🧴">🧴</option>
    <option value="🥤">🥤</option>
    <option value="🍞">🍞</option>
    <option value="🧊">🧊</option>
    <option value="🏠">🏠</option>
    <option value="📦">📦</option>
  </select>
  <input class="inp" id="itemInput" placeholder="Item hinzufügen..." autocomplete="off"
    onkeydown="if(event.key==='Enter') addItem()"/>
  <button class="add-btn" onclick="addItem()">+</button>
</div>

<div class="list-wrap" id="listWrap">
  <div class="loading">// VERBINDE MIT DATENBANK...</div>
</div>

<div class="bottom-bar">
  <div class="bottom-info" id="bottomInfo">// LADE...</div>
  <button class="clear-btn" onclick="clearChecked()">Erledigt löschen</button>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove, set }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB7fkq9rmnpqm_Fs1Y-1nPRjvET0DrX5MI",
  authDomain: "naen-einkaufsliste.firebaseapp.com",
  databaseURL: "https://naen-einkaufsliste-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "naen-einkaufsliste",
  storageBucket: "naen-einkaufsliste.firebasestorage.app",
  messagingSenderId: "175629942299",
  appId: "1:175629942299:web:831845ca0def6a979582be"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const itemsRef = ref(db, 'items');
const favsRef  = ref(db, 'favs');

const CAT_NAMES = {
  '🥦':'Gemüse & Obst','🥩':'Fleisch & Fisch','🧴':'Pflege & Hygiene',
  '🥤':'Getränke','🍞':'Brot & Backwaren','🧊':'Kühl & Tiefkühl',
  '🏠':'Haushalt','📦':'Sonstiges'
};

let items = {};
let favs  = {};
let currentTab = 'liste';

// ── SYNC-DOT ────────────────────────────
const syncDot = document.getElementById('syncDot');
function setOnline()  { syncDot.className='sync-dot'; }
function setSyncing() { syncDot.className='sync-dot syncing'; }
function setOffline() { syncDot.className='sync-dot offline'; }
window.addEventListener('online',  setOnline);
window.addEventListener('offline', setOffline);

// ── LIVE LISTENER ───────────────────────
onValue(itemsRef, snap => {
  items = snap.val() || {};
  setOnline();
  render();
});
onValue(favsRef, snap => {
  favs = snap.val() || {};
});

// ── ADD ─────────────────────────────────
window.addItem = function() {
  const inp  = document.getElementById('itemInput');
  const cat  = document.getElementById('catSelect').value;
  const name = inp.value.trim();
  if (!name) return;
  setSyncing();
  push(itemsRef, { name, cat, checked: false, fav: false, ts: Date.now() });
  inp.value = '';
  inp.focus();
};

// ── TOGGLE CHECK ────────────────────────
window.toggleCheck = function(id) {
  const item = items[id];
  if (!item) return;
  setSyncing();
  update(ref(db, `items/${id}`), { checked: !item.checked });
};

// ── TOGGLE FAV ──────────────────────────
window.toggleFav = function(id) {
  const item = items[id];
  if (!item) return;
  const newFav = !item.fav;
  setSyncing();
  update(ref(db, `items/${id}`), { fav: newFav });
  if (newFav) {
    const exists = Object.values(favs).find(f => f.name.toLowerCase() === item.name.toLowerCase());
    if (!exists) push(favsRef, { name: item.name, cat: item.cat });
  }
};

// ── DELETE ──────────────────────────────
window.deleteItem = function(id) {
  setSyncing();
  remove(ref(db, `items/${id}`));
};

// ── DELETE FAV ──────────────────────────
window.deleteFav = function(id) {
  setSyncing();
  remove(ref(db, `favs/${id}`));
};

// ── ADD FROM FAV ────────────────────────
window.addFromFav = function(name, cat) {
  setSyncing();
  push(itemsRef, { name, cat, checked: false, fav: true, ts: Date.now() });
  switchTab('liste');
};

// ── CLEAR CHECKED ───────────────────────
window.clearChecked = function() {
  setSyncing();
  Object.entries(items).forEach(([id, item]) => {
    if (item.checked) remove(ref(db, `items/${id}`));
  });
};

// ── TAB ─────────────────────────────────
window.switchTab = function(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tab));
  render();
};

// ── RENDER ──────────────────────────────
function render() {
  const wrap = document.getElementById('listWrap');
  const allItems = Object.entries(items).map(([id,v]) => ({id,...v}));
  allItems.sort((a,b) => (b.ts||0)-(a.ts||0));

  const open = allItems.filter(i => !i.checked);
  const done = allItems.filter(i =>  i.checked);

  document.getElementById('countBadge').textContent =
    `${open.length} ITEM${open.length!==1?'S':''}`;
  document.getElementById('bottomInfo').textContent =
    `// ${allItems.length} TOTAL · ${done.length} ERLEDIGT · ${open.length} OFFEN`;

  wrap.innerHTML = '';

  if (currentTab === 'favoriten') { renderFavs(wrap); return; }

  const source = currentTab === 'erledigt' ? done : open;

  if (source.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = currentTab === 'erledigt' ? 'nichts erledigt' : 'liste ist leer';
    wrap.appendChild(empty);
    return;
  }

  // group by category
  const grouped = {};
  source.forEach(item => {
    if (!grouped[item.cat]) grouped[item.cat] = [];
    grouped[item.cat].push(item);
  });

  Object.entries(grouped).forEach(([cat, catItems]) => {
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    const label = document.createElement('div');
    label.className = 'cat-label';
    label.innerHTML = `<span>${cat}</span>${(CAT_NAMES[cat]||'').toUpperCase()}`;
    sec.appendChild(label);

    catItems.forEach(item => {
      const row = document.createElement('div');
      row.className = `item ${item.checked?'checked':''}`;
      row.innerHTML = `
        <button class="cb ${item.checked?'on':''}" onclick="toggleCheck('${item.id}')">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
        </button>
        <div class="item-name">${esc(item.name)}</div>
        <button class="fav-btn ${item.fav?'on':''}" onclick="toggleFav('${item.id}')">★</button>
        <button class="del-btn" onclick="deleteItem('${item.id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>`;
      sec.appendChild(row);
    });
    wrap.appendChild(sec);
  });
}

function renderFavs(wrap) {
  const allFavs = Object.entries(favs).map(([id,v])=>({id,...v}));
  if (allFavs.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'keine favoriten — ★ bei einem item tippen';
    wrap.appendChild(empty);
    return;
  }
  const label = document.createElement('div');
  label.className = 'cat-label';
  label.style.marginBottom = '8px';
  label.textContent = 'GESPEICHERTE ITEMS';
  wrap.appendChild(label);

  allFavs.forEach(fav => {
    const row = document.createElement('div');
    row.className = 'fav-item';
    row.innerHTML = `
      <div>
        <div class="fav-name">${esc(fav.name)}</div>
        <div class="fav-cat">${fav.cat} ${(CAT_NAMES[fav.cat]||'').toUpperCase()}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="fav-add" onclick="addFromFav('${esc(fav.name)}','${fav.cat}')">+ Liste</button>
        <button class="del-btn" onclick="deleteFav('${fav.id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>`;
    wrap.appendChild(row);
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
